description: 'FOCUS-aligned FinOps for Kubecost: Apptio-licensed Kubernetes cost-allocation and optimization
  tooling. Foundations is free; Enterprise tiers are subscription contracts. The product itself emits
  the FinOps signal — its Allocation, Assets, Cloud Cost, Budget, Forecast, and Savings APIs are the
  data plane that downstream FinOps tooling consumes.'
sources:
  - https://www.apptio.com/pricing?src=kc-com
  - https://docs.kubecost.com/apis/monitoring-apis/api-allocation
