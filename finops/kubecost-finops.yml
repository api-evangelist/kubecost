meters:
  - name: cluster_cores
    unit: core
    aggregation: max
    dimensions:
      - cluster
      - cloud_provider
      - region
  - name: monitored_clusters
    unit: cluster
    aggregation: count
  - name: metric_retention_days
    unit: day
    aggregation: max
  - name: allocation_queries
    unit: request
    aggregation: sum
    dimensions:
      - api
      - window
      - aggregation
  - name: gpu_optimization_enabled
    unit: cluster
    aggregation: count
principles:
  - name: Visibility
    description: Use the Allocation, Assets, and Cloud Cost APIs to expose Kubernetes spend by namespace,
      label, deployment, controller, and cloud asset; reconcile against AWS/Azure/GCP bills via the bill-reconciliation
      pipeline.
  - name: Allocation
    description: Drive cost allocation off Kubernetes labels and annotations; align label keys with the
      organization's chargeback dimensions (team, product, environment).
  - name: Optimization
    description: Use the Savings API to surface right-sizing, abandoned workload, and request/limit recommendations;
      drive Forecast API into the FinOps planning loop.
  - name: Accountability
    description: Set Budget API alerts per namespace owner; review weekly Allocation deltas in the FinOps
      practice cadence; tie Foundations vs Enterprise feature differences (RBAC, retention) to the maturity
      stage of the consuming team.
maintainers:
